<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Table </title>
    <link rel="stylesheet" href="/Milestone1/module4/table/style.css">
</head>
<body>
    <h1>HTML Table</h1>
    <table>
        <caption>Data For Product</caption>
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Quality</th>
                <th>Product Quantity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>3424</td>
                <td>Wheat</td>
                <td>Good</td>
                <td>100 Bags</td>
            </tr>
            <tr>
                <td>5434</td>
                <td>Rice</td>
                <td>Good</td>
                <td>230 Bags</td>
            </tr>
            <tr>
                <td>3564</td>
                <td >Sugar</td>
                <td>Good</td>
                <td>546 Bags</td>
            </tr>
        </tbody>
        <tfoot>
            <tr> 
                <td colspan="4"> Paid</td>
            </tr>
        </tfoot>
    </table>    
</body>
</html>
